name: Integration tests

# Headless offscreen Vulkan suite for dasVulkan. Unlike the dasImgui-family
# packages, these tests run fully IN-PROCESS (offscreen render to an image +
# pixel readback; compute to a storage buffer) -- no window, no live subprocess.
# CI renders on Mesa lavapipe (the llvmpipe software Vulkan ICD), so it needs no
# GPU. The package vendors volk + Vulkan-Headers and the generated bindings are
# committed, so the build needs no Vulkan SDK.
#
# Linux lane runs the full offscreen suite on Mesa lavapipe (the llvmpipe software
# Vulkan ICD). macOS lane is build + loader-discovery only: GitHub's macOS runners
# expose only a paravirtualized GPU that MoltenVK can't render on, so it gates the
# macOS build (Metal bridge + frameworks) and the Homebrew loader discovery, not
# rendering. Windows (lavapipe/swiftshader) is still a follow-on.
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    defaults:
      run:
        shell: bash
    steps:
      - name: "Checkout daslang"
        uses: actions/checkout@v4
        with:
          repository: GaijinEntertainment/daScript
          path: daslang-src
          ref: master

      - name: "Checkout dasVulkan"
        uses: actions/checkout@v4
        with:
          path: dasVulkan

      - name: "Install lavapipe (software Vulkan) + tools"
        # The lavapipe ICD JSON path is not stable across distro versions, so
        # discover it after install rather than hardcoding it (the old hardcoded
        # /usr/share/vulkan/icd.d/lvp_icd.x86_64.json did not exist on noble, and
        # a missing VK_DRIVER_FILES path disables default ICD discovery entirely
        # -> ERROR_INCOMPATIBLE_DRIVER). Export the found path for later steps.
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers libvulkan1 vulkan-tools
          echo "=== /usr/share/vulkan/icd.d ==="
          ls -la /usr/share/vulkan/icd.d/ || true
          echo "=== mesa-vulkan-drivers ICD payload ==="
          dpkg -L mesa-vulkan-drivers 2>/dev/null | grep -iE 'icd|lvp|\.json' || true
          echo "=== any ICD json under /usr ==="
          find /usr -iname '*icd*.json' 2>/dev/null || true
          LVP=$(find /usr -iname 'lvp_icd*.json' 2>/dev/null | head -1)
          if [ -n "$LVP" ]; then
            echo "lavapipe ICD: $LVP"
            echo "VK_DRIVER_FILES=$LVP" >> "$GITHUB_ENV"
          else
            echo "WARNING: lavapipe ICD not found; relying on default loader discovery"
          fi

      - name: "Install CMake and Ninja"
        uses: lukka/get-cmake@latest

      - name: "Set up sccache"
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: "Build daslang"
        working-directory: daslang-src
        # The `daslang` binary + its shared runtime libs, plus `dasModuleStbImage`:
        # the texture tutorials' oracle gates (tut 8/10) load real JPG/HDR maps via
        # `require stbimage`, so its shared lib must be built (it is enabled by
        # default in daslang -- `--target daslang` alone just never builds it).
        # `dasModulePUGIXML` is the generator's vk.xml parser -- the skip-ratchet
        # step below re-runs the generator against the vendored registry. Building
        # daslang also produces lib/liblibDaScriptDyn{,_runtime}.so (the module
        # links them). LLVM/HV/GLFW stay unnecessary.
        run: |
          set -eux
          cmake --no-warn-unused-cli -B./build \
            -DCMAKE_BUILD_TYPE:STRING=Release \
            -DDAS_HV_DISABLED=ON \
            -DDAS_LLVM_DISABLED=ON \
            -DDAS_GLFW_DISABLED=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -G Ninja
          cmake --build ./build --parallel --target daslang dasModuleStbImage dasModulePUGIXML
          sccache --show-stats
          echo "BIN_DIR=bin" >> "$GITHUB_ENV"

      - name: "Build the dasVulkan native module"
        # Build the .shared_module directly (NOT via `daspkg install`): daspkg's
        # cmake_build hardcodes `cmake --build --parallel` with no job count, which
        # under Unix Makefiles becomes unlimited `make -j` and OOMs the runner on
        # the ~55 template-heavy generated TUs (exit 143). Here we drive it with an
        # explicit `--parallel 2` over Ninja + sccache, so it's bounded and cached.
        # Output lands at <repo>/dasModuleVulkan.shared_module (CMakeLists output dir)
        # and is picked up by `-load_module` below via the .das_module descriptor.
        run: |
          set -eux
          cmake -S "${GITHUB_WORKSPACE}/dasVulkan" -B "${GITHUB_WORKSPACE}/dasVulkan/_build" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDASLANG_DIR="${GITHUB_WORKSPACE}/daslang-src" \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          cmake --build "${GITHUB_WORKSPACE}/dasVulkan/_build" --config Release --parallel 2
          sccache --show-stats
          ls -la "${GITHUB_WORKSPACE}/dasVulkan"/*.shared_module

      - name: "Skip ratchet: the generator's skip tail must match the committed report"
        # Re-run the generator against the vendored vk.xml into scratch dirs (the tree
        # stays untouched) and diff the regenerated skip report against the committed
        # generator/skip_report.txt. An emitter change that silently GROWS the skip
        # tail (drops structs/commands from the generated surface) fails here; a
        # justified change regenerates the report in the same commit.
        working-directory: ${{ github.workspace }}/dasVulkan
        run: |
          set -eux
          mkdir -p /tmp/vk_regen_src /tmp/vk_regen_daslib
          "${GITHUB_WORKSPACE}/daslang-src/${BIN_DIR}/daslang" \
            -load_module "${GITHUB_WORKSPACE}/dasVulkan" \
            generator/generate.das -- \
            --out /tmp/vk_regen_src \
            --boost-out /tmp/vk_regen_daslib \
            --skip-report /tmp/vk_skip_report.txt
          diff -u generator/skip_report.txt /tmp/vk_skip_report.txt

      - name: "Lint: every committed .das must be clean (paranoid + perf + style)"
        # The unified linter (daslang's utils/lint/main.das) runs all three passes over the whole
        # tree, loading the dasVulkan module so the boost/tutorial/test files actually compile.
        # Exit 0 = clean, 2 = warnings, 1 = compile error -- `set -e` fails the job on any non-zero.
        # window/ (needs glfw) and recording/ (needs audio) files SKIP here because this CI daslang
        # is built without those modules; the local pre-push hook (utils/git-hooks/pre-push) covers
        # them on a full dev build. This is platform-independent, so it runs on the Linux lane only.
        working-directory: ${{ github.workspace }}/dasVulkan
        run: |
          set -eux
          "${GITHUB_WORKSPACE}/daslang-src/${BIN_DIR}/daslang" \
            -load_module "${GITHUB_WORKSPACE}/dasVulkan" \
            "${GITHUB_WORKSPACE}/daslang-src/utils/lint/main.das" -- \
            "${GITHUB_WORKSPACE}/dasVulkan" -q -j 0

      - name: "Verify lavapipe is visible to the loader"
        # VK_DRIVER_FILES comes from the discovery step (GITHUB_ENV); if it was not
        # found this still runs default discovery. No `|| true` -- a missing driver
        # here should fail loudly rather than let the tests report the same error.
        run: vulkaninfo --summary | grep -iE "deviceName|llvmpipe|apiVersion"

      - name: "Run integration tests (offscreen, lavapipe)"
        # Shaders are now authored in daslang and lowered to SPIR-V at compile time
        # by dasSpirv (tests/integration/triangle_shaders.das + compute_shaders.das),
        # so there is no committed .spv to resolve. The daslang binary and dastest
        # entry point are referenced by absolute path. VK_DRIVER_FILES (lavapipe
        # ICD) is inherited from the discovery step. MUST NOT run under sudo --
        # the loader ignores VK_DRIVER_FILES for elevated procs.
        working-directory: ${{ github.workspace }}/dasVulkan
        run: |
          set -eux
          "${GITHUB_WORKSPACE}/daslang-src/${BIN_DIR}/daslang" \
            -load_module "${GITHUB_WORKSPACE}/dasVulkan" \
            "${GITHUB_WORKSPACE}/daslang-src/dastest/dastest.das" -- \
            --test "${GITHUB_WORKSPACE}/dasVulkan/tests/integration" \
            --timeout 600 \
            --isolated-mode \
            --isolated-mode-threads 4

      - name: "Run tutorial pixel-oracle gates (offscreen, lavapipe)"
        # Each self-contained tutorial under tutorials/<name>/ carries a pixel-oracle
        # [test] that is its regression gate. The recording drivers live in each
        # tutorial's recording/ subdir and are skipped here by tutorials/.das_test
        # (they need stbimage + audio, which this daslang build does not load).
        working-directory: ${{ github.workspace }}/dasVulkan
        run: |
          set -eux
          "${GITHUB_WORKSPACE}/daslang-src/${BIN_DIR}/daslang" \
            -load_module "${GITHUB_WORKSPACE}/dasVulkan" \
            "${GITHUB_WORKSPACE}/daslang-src/dastest/dastest.das" -- \
            --test "${GITHUB_WORKSPACE}/dasVulkan/tutorials" \
            --timeout 600 \
            --isolated-mode \
            --isolated-mode-threads 4

  build_macos:
    # macOS build + loader-discovery gate (Apple Silicon). GitHub's macOS runners
    # expose only a paravirtualized GPU (AppleParavirtGPU) that cannot run the
    # offscreen render suite -- stock MoltenVK crashes during device init, and even
    # with Metal argument buffers disabled the render tests fail with
    # ERROR_OUT_OF_DEVICE_MEMORY allocating targets (the same suite passes on real
    # Apple GPUs). So this lane gates what CAN be checked headless: the macOS build
    # (the CMake APPLE branch, the CAMetalLayer bridge dasVULKAN.metal.mm,
    # Cocoa/QuartzCore linking) plus a no-render smoke that exercises the Homebrew
    # loader discovery (das_volkInitialize). Render testing stays on real hardware
    # (local). See ROADMAP "macOS CI".
    runs-on: macos-14
    env:
      SCCACHE_GHA_ENABLED: "true"
    defaults:
      run:
        shell: bash
    steps:
      - name: "Checkout daslang"
        uses: actions/checkout@v4
        with:
          repository: GaijinEntertainment/daScript
          path: daslang-src
          ref: master

      - name: "Checkout dasVulkan"
        uses: actions/checkout@v4
        with:
          path: dasVulkan

      - name: "Install Vulkan loader + MoltenVK + modern bison"
        # The loader + MoltenVK let the smoke step exercise das_volkInitialize's
        # Homebrew-loader discovery (the smoke uses a raw, non-portability
        # vkCreateInstance, so the loader returns INCOMPATIBLE_DRIVER *before*
        # MoltenVK's crashing device init -- no GPU is touched).
        #
        # bison: macOS ships GNU bison 2.3, too old for daslang's parser grammar
        # (`expecting string`). Install Homebrew bison 3.x and prepend it to PATH
        # for the build step via $GITHUB_PATH (the default non-login shell does not
        # source ~/.bash_profile). `brew --prefix bison` resolves the keg path
        # regardless of the Homebrew prefix (/opt/homebrew vs /usr/local).
        run: |
          set -eux
          brew install vulkan-loader molten-vk bison
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"

      - name: "Install CMake and Ninja"
        uses: lukka/get-cmake@latest

      - name: "Set up sccache"
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: "Build daslang"
        working-directory: daslang-src
        # The daslang binary + its shared runtime dylibs, plus `dasModuleStbImage`:
        # the texture tutorials' oracle gates (tut 8/10) load real JPG/HDR maps via
        # `require stbimage`, so its shared lib must be built. The module links
        # lib/liblibDaScriptDyn{,_runtime}.dylib. Generated dasVulkan C++ is
        # committed, so no generator run -- pugixml/LLVM/HV/GLFW are unnecessary.
        run: |
          set -eux
          bison --version | head -1   # must be Homebrew 3.x, not the macOS system 2.3
          cmake --no-warn-unused-cli -B./build \
            -DCMAKE_BUILD_TYPE:STRING=Release \
            -DDAS_HV_DISABLED=ON \
            -DDAS_PUGIXML_DISABLED=ON \
            -DDAS_LLVM_DISABLED=ON \
            -DDAS_GLFW_DISABLED=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -G Ninja
          cmake --build ./build --parallel --target daslang dasModuleStbImage
          sccache --show-stats
          echo "BIN_DIR=bin" >> "$GITHUB_ENV"

      - name: "Build the dasVulkan native module (Metal bridge + frameworks)"
        # The CMake APPLE branch compiles src/dasVULKAN.metal.mm (the CAMetalLayer
        # bridge) and links Cocoa + QuartzCore. Bounded --parallel 2 over Ninja +
        # sccache (the ~55 generated TUs are template-heavy).
        run: |
          set -eux
          cmake -S "${GITHUB_WORKSPACE}/dasVulkan" -B "${GITHUB_WORKSPACE}/dasVulkan/_build" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDASLANG_DIR="${GITHUB_WORKSPACE}/daslang-src" \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          cmake --build "${GITHUB_WORKSPACE}/dasVulkan/_build" --config Release --parallel 2
          sccache --show-stats
          ls -la "${GITHUB_WORKSPACE}/dasVulkan"/*.shared_module

      - name: "Smoke: module loads + Homebrew loader discovery (no render)"
        # examples/smoke.das requires the raw `vulkan` module (proves the
        # .shared_module loads on macOS) and calls volkInitialize -> our
        # das_volkInitialize, which must find the loader that volk's built-in macOS
        # search misses (it dlopen's the Homebrew/SDK paths after volk's own search
        # fails). It then does a raw (non-portability) vkCreateInstance, which
        # the loader rejects with INCOMPATIBLE_DRIVER without entering MoltenVK's
        # device init -- so no GPU. Assert volkInitialize succeeded (loader found).
        working-directory: ${{ github.workspace }}/dasVulkan
        run: |
          set -eux
          out=$("${GITHUB_WORKSPACE}/daslang-src/${BIN_DIR}/daslang" \
            -load_module "${GITHUB_WORKSPACE}/dasVulkan" \
            "${GITHUB_WORKSPACE}/dasVulkan/examples/smoke.das")
          echo "$out"
          echo "$out" | grep -q "Vulkan instance version" \
            || { echo "loader discovery regressed: das_volkInitialize did not find the Homebrew loader"; exit 1; }
